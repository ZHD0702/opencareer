# Career Advice Topic Templates

topics:
  简历:
    keywords:
      - "简历"
      - "resume"
      - "CV"
      - "履历"
    advice:
      - "用STAR法则（情境-任务-行动-结果）描述每段经历，量化成果"
      - "简历控制在1页以内，针对每个岗位定制关键词"
      - "教育经历放前面（应届生），工作经历放前面（有经验者）"
      - "避免空洞形容词（'勤奋'、'努力'），用具体事实说话"

  面试:
    keywords:
      - "面试"
      - "interview"
      - "面经"
    advice:
      - "准备'自我介绍'的3分钟版本，突出与岗位最相关的3个亮点"
      - "用STAR法则准备行为面试问题（领导力、团队合作、解决问题）"
      - "提前研究目标公司的业务、文化和近期新闻"
      - "准备2-3个反问面试官的问题，展示你的思考深度"

  谈薪资:
    keywords:
      - "薪资"
      - "工资"
      - "salary"
      - "待遇"
      - "package"
    advice:
      - "面试前调研目标岗位的市场薪资范围（脉脉、Boss直聘、Glassdoor）"
      - "不要先出价——让HR先说范围，你再说'期望在这个区间内'"
      - "除了base，关注期权、年终、补贴、公积金等总包"
      - "手里有其他offer是最好的谈判筹码"

  职业规划:
    keywords:
      - "规划"
      - "发展"
      - "方向"
      - "career"
      - "转行"
    advice:
      - "3-5年职业规划要具体到岗位和技能，而不是'成为更好的人'"
      - "用'技能-行业-岗位'三维度定位自己：你擅长什么？对什么行业感兴趣？什么岗位能发挥你的优势？"
      - "每1-2年评估一次职业方向，及时调整"
      - "建立行业人脉，参加行业活动，保持对市场需求的敏感度"

  default:
    keywords: []
    advice:
      - "明确你的职业兴趣和优势，可以用MBTI、霍兰德等工具辅助了解自己"
      - "多投多面，保持'面试手感'，把每次面试当练习"
      - "建立求职跟踪表，记录每份投递的状态和反馈"
      - "利用LinkedIn、脉脉等平台建立专业形象和人脉"

next_step_suggestion: "选择一个你最关心的话题，我可以给出更具体的建议"
