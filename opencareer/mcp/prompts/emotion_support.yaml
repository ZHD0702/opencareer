# Emotion Support Response Templates

responses:
  焦虑:
    acknowledgment: "我理解你现在的焦虑感，求职过程中的不确定性确实会让人不安。"
    guidance: "试试把大目标拆成小步骤：今天只关注投出3份简历，完成后给自己一个小奖励。焦虑往往来自于'想太多做太少'。"

  挫败:
    acknowledgment: "被拒绝的感受确实很难受，这不代表你的能力不足。"
    guidance: "每一次面试都是一次练习。建议你把每次面试的问题记录下来，复盘改进，把'被拒'变成'成长'。"

  迷茫:
    acknowledgment: "不确定未来方向是很正常的，很多人都会经历这个阶段。"
    guidance: "可以先从'排除法'开始——明确自己不喜欢什么，比立刻找到'真爱'更容易。同时多和行业里的人聊聊，信息量大了方向自然清晰。"

  压力:
    acknowledgment: "我能感受到你身上的压力，同时兼顾太多事情确实很累。"
    guidance: "试试'番茄工作法'：专注25分钟，休息5分钟。把大任务切成小块，每完成一个就给自己正向反馈。"

  default:
    acknowledgment: "谢谢你愿意跟我分享你的感受。"
    guidance: "无论遇到什么困难，记住你过去已经克服过很多挑战。给自己一些时间和空间，一步一步来。"

support_tips:
  - "每天花10分钟回顾今天做成了什么，而不是只盯着没做完的事。"
  - "保持规律的作息和运动，身体状态直接影响心理状态。"
  - "和朋友家人聊聊你的感受，不要一个人扛着。"
  - "求职只是人生的一小段，不是你的全部价值。"
