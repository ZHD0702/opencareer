# Interview Preparation Question Templates

questions:
  通用:
    - "请做一个简单的自我介绍"
    - "你为什么想加入我们公司？"
    - "你的优缺点分别是什么？"
    - "你未来3-5年的职业规划是什么？"
    - "你如何处理工作中的压力和冲突？"

  技术:
    - "介绍一下你做过的最有挑战性的技术项目"
    - "你是如何保持技术学习的？"
    - "请解释一个你熟悉的技术概念（如微服务、异步编程等）"
    - "遇到技术难题时你的解决思路是什么？"
    - "你如何保证代码质量和项目进度？"

  行为:
    - "请举例说明你如何与不同意见的同事合作完成项目"
    - "描述一次你主动承担额外责任的经历"
    - "你有没有失败的经历，从中学到了什么？"
    - "你如何安排多个任务的优先级？"
    - "描述一次你帮助团队提升效率的经历"

tips:
  - "面试前1天：复习JD中的关键词，准备对应的经历案例"
  - "面试前1小时：深呼吸，回顾你的3个核心亮点，保持自信"
  - "面试中：先听清问题再回答，不懂的坦诚说'不太了解但愿意学'"
  - "面试后：24小时内发感谢邮件，简要重申你对岗位的兴趣"

star_reminder: "回答行为问题时使用STAR框架：情境(Situation) → 任务(Task) → 行动(Action) → 结果(Result)"
