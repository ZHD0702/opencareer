name: Python 项目自动化流水线
run-name: 运行 feature 分支测试

# 只在 feature 分支提交时触发
on:
  push:
    branches:
      - 'feature/langchain+mcp'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 代码检查 + 运行程序
        run: |
          echo "✅ 流水线开始运行"
          python main.py